name: Atualizar Métricas e Deploy

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gerar métricas reais do GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: dev
        run: |
          python3 <<'PY'
          import os, json, datetime, urllib.request, urllib.parse, re, ssl

          token = os.environ["GITHUB_TOKEN"]
          repo_full = os.environ["REPOSITORY"]
          owner, repo = repo_full.split("/")
          branch = os.environ["BRANCH_NAME"]

          headers = {
            "Authorization": f"token {token}",
            "Accept": "application/vnd.github.v3+json",
            "User-Agent": "github-actions"
          }
          ctx = ssl.create_default_context()

          def gh_request(url):
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req, context=ctx) as resp:
              return json.load(resp), resp.getheader("Link")

          def gh_fetch_all(url):
            items = []
            while url:
              data, link = gh_request(url)
              if isinstance(data, dict) and "items" in data:
                items.extend(data["items"])
              elif isinstance(data, list):
                items.extend(data)
              else:
                items.append(data)
              url = None
              if link:
                for part in link.split(","):
                  if 'rel="next"' in part:
                    url = part[part.index("<")+1:part.index(">")]
                    break
            return items

          def query_count(q):
            url = "https://api.github.com/search/issues?q=" + urllib.parse.quote(q)
            data, _ = gh_request(url)
            return data.get("total_count", 0)

          def strip_markdown(text):
            text = re.sub(r"```.*?```", "", text, flags=re.S)
            text = re.sub(r"<!--.*?-->", "", text, flags=re.S)
            text = re.sub(r"(^|\n)[ \t]*[#>*+-].*", r"\1", text)
            text = re.sub(r"\n+", " ", text)
            return text.strip()

          today = datetime.date.today()
          start_date = today - datetime.timedelta(days=6)

          issues_cache = gh_fetch_all(
            f"https://api.github.com/repos/{owner}/{repo}/issues?state=all&since={start_date.isoformat()}T00:00:00Z&per_page=100"
          )

          metrics = []
          for day_offset in range(7):
            current = start_date + datetime.timedelta(days=day_offset)
            since = datetime.datetime.combine(current, datetime.time.min).isoformat() + "Z"
            until = datetime.datetime.combine(current + datetime.timedelta(days=1), datetime.time.min).isoformat() + "Z"

            commits = gh_fetch_all(
              f"https://api.github.com/repos/{owner}/{repo}/commits?sha={branch}&since={since}&until={until}&per_page=100"
            )

            additions = 0
            deletions = 0
            for commit in commits:
              sha = commit["sha"]
              detail, _ = gh_request(f"https://api.github.com/repos/{owner}/{repo}/commits/{sha}")
              stats = detail.get("stats", {})
              additions += stats.get("additions", 0)
              deletions += stats.get("deletions", 0)

            issues_opened = query_count(f"repo:{owner}/{repo} type:issue created:{current.isoformat()}")
            issues_closed = query_count(f"repo:{owner}/{repo} type:issue closed:{current.isoformat()}")

            bodies = []
            for issue in issues_cache:
              if issue.get("pull_request"):
                continue
              created_at = datetime.datetime.fromisoformat(issue["created_at"].replace("Z", "+00:00")).date()
              if created_at == current:
                body = strip_markdown(issue.get("body") or "")
                if body:
                  bodies.append(len(body))

            char_avg = round(sum(bodies) / len(bodies)) if bodies else 0

            metrics.append({
              "date": current.isoformat(),
              "commits": len(commits),
              "issuesOpened": issues_opened,
              "issuesClosed": issues_closed,
              "additions": additions,
              "deletions": deletions,
              "charCountAverage": char_avg
            })

          payload = {
            "project": repo,
            "generatedAt": today.isoformat(),
            "branch": branch,
            "metrics": metrics
          }

          with open("data.json", "w", encoding="utf-8") as f:
            json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit data.json
        run: |
          git config user.name "metrics-bot"
          git config user.email "metrics-bot@github.com"
          git add data.json
          git commit -m "Atualiza métricas do dashboard" || echo "Sem mudanças para commitar"
          git push origin dev || echo "Falha no push"

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
