name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend (Python/FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Lint com flake8
        working-directory: ./backend
        run: flake8 . --max-line-length=88 --exclude=.venv,migrations

      - name: Formatação com black
        working-directory: ./backend
        run: black --check .

      - name: Rodar testes com pytest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

  frontend:
    name: Frontend (Next.js/Tailwind)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm ci

      - name: Lint com ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Verificar tipos com TypeScript
        working-directory: ./frontend
        run: npm run type-check

      - name: Rodar testes com Jest
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Build de produção
        working-directory: ./frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build das imagens Docker
        run: docker compose build --no-cache

      - name: Subir ambiente e verificar saúde
        run: |
          docker compose up -d
          sleep 15
          docker compose ps
          curl --fail http://localhost:8000/health || exit 1
          curl --fail http://localhost:3000 || exit 1

      - name: Derrubar ambiente
        if: always()
        run: docker compose down -v