site_name: Squad 07 - 2026
site_url: https://unb-mds.github.io/2026-1-Squad07/
site_description: Documentação do Projeto Squad 07
site_author: Squad 07
docs_dir: docs
site_dir: site

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate

plugins:
  - search
  - offline

nav:
  - Início: index.md
  - Arquitetura:
    - Visão Geral: architecture/index.md
    - Estrutura de Pastas: architecture/directory-structure.md
    - Padrões de Projeto: architecture/design-patterns.md
  - Métricas: metricas/index.html

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - tables
  - toc:
      toc_depth: 3

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js
